name: Sync manifest version from tag

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

concurrency:
  group: sync-manifest-version
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    name: Sync manifest.json version to release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Update manifest.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          MANIFEST="custom_components/unifi_network_rules/manifest.json"

          CURRENT=$(python3 -c "import json; print(json.load(open('${MANIFEST}'))['version'])")
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "manifest.json already at ${VERSION}, nothing to do"
            exit 0
          fi

          python3 -c "
          import json, sys
          path, version = sys.argv[1], sys.argv[2]
          with open(path) as f:
              data = json.load(f)
          data['version'] = version
          with open(path, 'w') as f:
              json.dump(data, f, indent=4)
          " "$MANIFEST" "$VERSION"
          echo "manifest.json: ${CURRENT} -> ${VERSION}"

      - name: Commit and push if changed
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add custom_components/unifi_network_rules/manifest.json

          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          git commit -m "chore(release): sync manifest.json to ${TAG_NAME} [skip ci]"
          git push
